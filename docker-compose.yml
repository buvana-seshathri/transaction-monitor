services:  # List of Docker containers to run

  kafka:  # Service name
    image: apache/kafka:latest  # Use the latest Kafka image
    container_name: kafka  # Name the container "kafka"

    ports:
      - "9092:9092"  # Map host port 9092 to Kafka port 9092

    environment:
      KAFKA_NODE_ID: 1  # Unique ID of this Kafka broker

      KAFKA_PROCESS_ROLES: broker,controller  # Acts as both broker and controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093  # Open ports for clients and controller

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092  # Address clients use to connect

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER  # Controller uses the CONTROLLER listener

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093  # Single controller in the cluster

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT  # Use plaintext communication

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT  # Brokers communicate using PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # Keep one copy of consumer offsets (single broker)